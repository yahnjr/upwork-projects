<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Data Map</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.css' rel='stylesheet' />
    <link href='style.css' rel='stylesheet' />
</head>
<body>
    <div id="menu">
        <div id="layer-controls">
            <div class="layer-item">
                <input id="walkability-toggle" type="radio" class="radio-option" name="layer-control" value="Walkability" checked>
                <label for="walkability-toggle">Walkability</label>
                <div class="layer-buttons">
                    <button class="filter-btn" data-layer="Walkability">Filter</button>
                    <button class="compare-btn" data-layer="Walkability" disabled>Compare</button>
                </div>
                <div class="filter-slider hidden" id="Walkability-slider">
                    <input type="range" min="1" max="10" value="10" class="slider" id="Walkability-range">
                    <span class="slider-value">1</span>
                    <button class="reset-filter">Reset</button>
                </div>
            </div>
            <div class="layer-item">
                <input id="crime-toggle" type="radio" class="radio-option" name="layer-control" value="Crime">
                <label for="crime-toggle">Crime</label>
                <div class="layer-buttons">
                    <button class="filter-btn" data-layer="Crime">Filter</button>
                    <button class="compare-btn" data-layer="Crime">Compare</button>
                </div>
                <div class="filter-slider hidden" id="Crime-slider">
                    <input type="range" min="1" max="10" value="10" class="slider" id="Crime-range">
                    <span class="slider-value">1</span>
                    <button class="reset-filter">Reset</button>
                </div>
            </div>
            <div class="layer-item">
                <input id="air-quality-toggle" type="radio" class="radio-option" name="layer-control" value="Air Quality">
                <label for="air-quality-toggle">Air Quality</label>
                <div class="layer-buttons">
                    <button class="filter-btn" data-layer="Air Quality">Filter</button>
                    <button class="compare-btn" data-layer="Air Quality">Compare</button>
                </div>
                <div class="filter-slider hidden" id="Air Quality-slider">
                    <input type="range" min="1" max="10" value="10" class="slider" id="Air Quality-range">
                    <span class="slider-value">1</span>
                    <button class="reset-filter">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <div id="property-list-container">
        <div id="property-list-title">
            Selected Properties <span id="selected-count">(0/5)</span>
            <button id="finished-btn" class="action-btn">Finished</button>
        </div>
        <div id="property-list"></div>
    </div>

    <div id="property-details">
        <h3 id="property-address">Property Details</h3>
        <div class="metric-container">
            <div class="metric-value">
                <span>Walkability:</span>
                <span id="walkability-value">--</span>
            </div>
            <div id="walkability-bar" class="metric-bar" style="background: #41b6c4; width: 0%"></div>
        </div>
        <div class="metric-container">
            <div class="metric-value">
                <span>Air Quality:</span>
                <span id="air-quality-value">--</span>
            </div>
            <div id="air-quality-bar" class="metric-bar" style="background: #fdcc8a; width: 0%"></div>
        </div>
        <div class="metric-container">
            <div class="metric-value">
                <span>Crime:</span>
                <span id="crime-value">--</span>
            </div>
            <div id="crime-bar" class="metric-bar" style="background: #abd9e9; width: 0%"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="script.js"></script>
</body>
</html>
